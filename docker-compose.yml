services:
  web-app:
    image: hungnguyen008/web-sellbook:1.0.3
    container_name: web-app
    ports:
      - "8082:8082"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=WebSellBook;User Id=sa;Password=StrongP@ssw0rd123;
    depends_on:
      - sqlserver
    networks:
      - monitoring

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=StrongP@ssw0rd123
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - monitoring
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "StrongP@ssw0rd123", "-Q", "SELECT 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus     
      - prometheus-data:/prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=user1@gmail.com
      - GF_SMTP_PASSWORD=mysamplePassword
      - GF_SMTP_FROM_ADDRESS=user1@gmail.com
      # - GF_SERVER_DOMAIN=grafana.my.domain
      # - GF_SERVER_ROOT_URL=grafana.my.domain
    restart: unless-stopped


  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    ports:
      - "9100:9100"
    networks:
      - monitoring

volumes:
  sql_data:
  prometheus-data:
  grafana-data:

networks:
  monitoring:
    driver: bridge
